name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Java services — unit + Testcontainers integration tests
  # ─────────────────────────────────────────────────────────────
  test-java-services:
    name: Test · ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - product-service
          - order-service
          - forecast-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Test
        working-directory: demand-forecast-platform/services/${{ matrix.service }}
        run: mvn test -B

  # ─────────────────────────────────────────────────────────────
  # Python ML inference service
  # ─────────────────────────────────────────────────────────────
  test-ml-service:
    name: Test · ml-inference-service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: demand-forecast-platform/services/ml-inference-service/requirements.txt

      - name: Install dependencies
        working-directory: demand-forecast-platform/services/ml-inference-service
        # prophet is in requirements.txt for Docker but not needed at runtime —
        # the forecaster uses numpy/pandas only. Skip it to keep CI fast.
        run: |
          pip install \
            fastapi==0.111.0 \
            "uvicorn[standard]==0.29.0" \
            pydantic==2.7.0 \
            pandas==2.2.2 \
            numpy==1.26.4 \
            scikit-learn==1.4.2 \
            joblib==1.4.2 \
            httpx==0.27.0 \
            pytest==8.2.0 \
            pytest-asyncio==0.23.6

      - name: Test
        working-directory: demand-forecast-platform/services/ml-inference-service
        run: pytest tests/ -v

  # ─────────────────────────────────────────────────────────────
  # Docker image builds — verifies each service produces a valid image
  # Runs only after all tests pass
  # ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker · ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test-java-services, test-ml-service]
    strategy:
      fail-fast: false
      matrix:
        service:
          - product-service
          - order-service
          - forecast-service
          - notification-service
          - api-gateway
          - ml-inference-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: demand-forecast-platform/services/${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
